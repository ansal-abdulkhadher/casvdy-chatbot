<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASVDY - College of Applied Science</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
        }
        header {
            background-color: #004d40;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            text-align: center;
        }
        /* Chatbot Styles */
        #chat-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 300px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #chat-header {
            background: #004d40;
            color: white;
            padding: 15px;
            font-weight: bold;
            text-align: center;
        }
        #chat-box {
            height: 300px;
            padding: 10px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #fafafa;
        }
        .message {
            padding: 8px 12px;
            border-radius: 15px;
            max-width: 80%;
            font-size: 14px;
        }
        .user-message {
            background: #004d40;
            color: white;
            align-self: flex-end;
        }
        .bot-message {
            background: #e0e0e0;
            color: black;
            align-self: flex-start;
        }
        #input-area {
            display: flex;
            border-top: 1px solid #ddd;
        }
        #user-input {
            flex: 1;
            padding: 10px;
            border: none;
            outline: none;
        }
        #send-btn {
            background: #004d40;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
        }
        #send-btn:hover {
            background: #00332b;
        }
    </style>
</head>
<body>

    <header>
        <h1>College of Applied Science, Vadakkencherry</h1>
        <p>Fostering Excellence Since 1993</p>
    </header>

    <div class="container">
        <h2>Welcome to the Dummy Portal</h2>
        <p>Look at the bottom right corner to interact with the new chatbot!</p>
    </div>

    <div id="chat-container">
        <div id="chat-header">CASVDY Assistant</div>
        <div id="chat-box">
            <div class="message bot-message">Hello! How can I help you with CASVDY today?</div>
        </div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Ask about courses, location..." onkeypress="handleKeyPress(event)">
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const inputField = document.getElementById("user-input");
            const chatBox = document.getElementById("chat-box");
            const userText = inputField.value.trim();

            if (userText === "") return;

            // 1. Show the user's message in the chat window
            chatBox.innerHTML += `<div class="message user-message">${userText}</div>`;
            inputField.value = ""; // Clear the input box
            chatBox.scrollTop = chatBox.scrollHeight; // Scroll to bottom

            try {
                // 2. Send the message to your Python server!
                const response = await fetch("http://127.0.0.1:5000/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ message: userText })
                });

                // 3. Receive the Python server's answer
                const data = await response.json();
                
                // 4. Show the bot's answer in the chat window
                chatBox.innerHTML += `<div class="message bot-message">${data.response}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
                
            } catch (error) {
                // If the Python server is off, show an error
                chatBox.innerHTML += `<div class="message bot-message" style="color: red;">Error: Cannot connect to server. Is Python running?</div>`;
            }
        }

        // Allow pressing "Enter" to send
        function handleKeyPress(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }
    </script>

</body>
</html>
